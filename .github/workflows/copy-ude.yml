name: Copy Dataverse DB (URL-based, OIDC, no inputs)

on:
  workflow_dispatch

permissions:
  id-token: write
  contents: read

env:
  SOURCE_ENV_URL: "https://org6ee75726.crm8.dynamics.com"
  TARGET_ENV_URL: "https://orgc6161dd6.crm8.dynamics.com"
  COPY_TYPE: "FullCopy"
  WAIT_MINUTES: "240"

jobs:
  copy-db:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Power Platform CLI
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Ensure PAC CLI
        shell: bash
        run: |
          set -e
          if ! command -v pac >/dev/null 2>&1; then
            dotnet tool install -g Microsoft.PowerApps.CLI.Tool
            echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
          fi
          pac help

      # Base OIDC authentication
      - name: PAC auth base
        shell: bash
        run: |
          pac auth clear || true
          pac auth create \
            --tenant "${{ secrets.PP_TENANT_ID }}" \
            --applicationId "${{ secrets.PP_CLIENT_ID }}" \
            --githubFederated

      # 🔑 Resolve SOURCE env ID
      - name: Resolve SOURCE environment ID
        shell: bash
        run: |
          set -e
          pac auth create \
            --url "$SOURCE_ENV_URL" \
            --name "sourceEnv"

          pac auth select --name "sourceEnv"

          SOURCE_ID=$(pac org who --json | jq -r '.EnvironmentId')

          echo "SOURCE_ENV_ID=$SOURCE_ID" >> $GITHUB_ENV
          echo "Resolved SOURCE_ENV_ID: $SOURCE_ID"

      # 🔑 Resolve TARGET env ID
      - name: Resolve TARGET environment ID
        shell: bash
        run: |
          set -e
          pac auth create \
            --url "$TARGET_ENV_URL" \
            --name "targetEnv"

          pac auth select --name "targetEnv"

          TARGET_ID=$(pac org who --json | jq -r '.EnvironmentId')

          echo "TARGET_ENV_ID=$TARGET_ID" >> $GITHUB_ENV
          echo "Resolved TARGET_ENV_ID: $TARGET_ID"

      # 🚀 Copy Dataverse DB
      - name: Copy Dataverse database
        shell: bash
        run: |
          set -e

          case "$COPY_TYPE" in
            FullCopy|MinimalCopy) ;;
            *) echo "Invalid COPY_TYPE" && exit 2 ;;
          esac

          pac admin copy \
            --name "DataverseCopyJob" \
            --source-env "$SOURCE_ENV_ID" \
            --target-env "$TARGET_ENV_ID" \
            --type "$COPY_TYPE" \
            --async false \
            --max-async-wait-time "$WAIT_MINUTES"

      - name: Done
        run: echo "✅ Database copy completed."
