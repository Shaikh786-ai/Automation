name: Delete UDE (OIDC, no secrets)

on:
  workflow_dispatch:
    inputs:
      environment_id:
        description: "Enter Power Platform Environment ID (GUID)"
        required: true
        type: string

  push:
    branches:
      - My_Automation

permissions:
  id-token: write   # required for GitHub OIDC
  contents: read

jobs:
  delete-ude:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install PAC CLI wrapper actions
      - uses: microsoft/powerplatform-actions/actions-install@v1

      # Delete environment using federated credentials (no client secret)
      - name: Delete UDE environment
        uses: microsoft/powerplatform-actions/delete-environment@v1
        with:
          app-id:    ${{ secrets.CLIENT_ID }}
          tenant-id: ${{ secrets.PP_TENANT_ID }}

          # Take environment ID from user input instead of hardcoding
          environment-id: ${{ github.event.inputs.environment_id }}

          force: true
          wait-for-completion: true
          max-async-wait-time: 90
