name: Copy Dataverse DB (URL-based, OIDC, no inputs)

on:
  workflow_dispatch

permissions:
  id-token: write
  contents: read

env:
  SOURCE_ENV_URL: "https://org6ee75726.crm8.dynamics.com"
  TARGET_ENV_URL: "https://orgc6161dd6.crm8.dynamics.com"
  COPY_TYPE: "FullCopy"
  WAIT_MINUTES: "240"

jobs:
  copy-db:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Install PAC CLI
      - name: Install Power Platform CLI
        uses: microsoft/powerplatform-actions/actions-install@v1

      # Ensure PAC CLI exists
      - name: Ensure PAC CLI
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v pac >/dev/null 2>&1; then
            dotnet tool install -g Microsoft.PowerApps.CLI.Tool
            echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
          fi
          pac help >/dev/null

      # OIDC Authentication
      - name: PAC auth (OIDC)
        shell: bash
        run: |
          set -euo pipefail
          pac auth clear || true
          pac auth create \
            --tenant "${{ secrets.PP_TENANT_ID }}" \
            --applicationId "${{ secrets.PP_CLIENT_ID }}" \
            --githubFederated

          echo "✅ Authenticated"
          pac auth who

      # Validate environments are visible
      - name: Validate environment access
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking accessible environments..."
          pac org list

      # 🔑 Resolve SOURCE environment ID
      - name: Resolve SOURCE environment ID
        shell: bash
        run: |
          set -euo pipefail

          pac org select --environment "$SOURCE_ENV_URL"

          SOURCE_ID=$(pac org who --json | jq -r '.EnvironmentId')

          if [ -z "$SOURCE_ID" ] || [ "$SOURCE_ID" = "null" ]; then
            echo "❌ Failed to resolve SOURCE environment ID"
            exit 1
          fi

          echo "SOURCE_ENV_ID=$SOURCE_ID" >> $GITHUB_ENV
          echo "✅ SOURCE_ENV_ID: $SOURCE_ID"

      # 🔑 Resolve TARGET environment ID
      - name: Resolve TARGET environment ID
        shell: bash
        run: |
          set -euo pipefail

          pac org select --environment "$TARGET_ENV_URL"

          TARGET_ID=$(pac org who --json | jq -r '.EnvironmentId')

          if [ -z "$TARGET_ID" ] || [ "$TARGET_ID" = "null" ]; then
            echo "❌ Failed to resolve TARGET environment ID"
            exit 1
          fi

          echo "TARGET_ENV_ID=$TARGET_ID" >> $GITHUB_ENV
          echo "✅ TARGET_ENV_ID: $TARGET_ID"

      # 🚀 Copy Dataverse DB
      - name: Copy Dataverse database
        shell: bash
        run: |
          set -euo pipefail

          echo "SOURCE: $SOURCE_ENV_ID"
          echo "TARGET: $TARGET_ENV_ID"

          case "$COPY_TYPE" in
            FullCopy|MinimalCopy) ;;
            *) echo "❌ Invalid COPY_TYPE" && exit 2 ;;
          esac

          pac admin copy \
            
            --source-env "$SOURCE_ENV_ID" \
            --target-env "$TARGET_ENV_ID" \
            --type "$COPY_TYPE" \
            --async false \
            --max-async-wait-time "$WAIT_MINUTES"

      - name: Done
        run: echo "✅ Database copy completed."
