name: Create UDE (OIDC, no secrets)  
# Defines the name of the workflow as it appears in GitHub Actions. 
# It indicates this workflow creates a UDE environment using OIDC authentication (without client secrets).

on:                   # Specifies when the workflow should run.
  workflow_dispatch   # Allows you to trigger the workflow manually from the GitHub UI (instead of running automatically on every push).

permissions:          # Defines what access the workflow has.
  id-token: write     # Grants permission to request an OIDC token for secure authentication.
  contents: read      # Allows the workflow to read repository contents (needed for checkout and other actions).

jobs:                 # Groups all the jobs (tasks) in the workflow.
  create-ude:         # Defines a job named create-ude.
    runs-on: ubuntu-latest  # Specifies that the job will run on the latest Ubuntu virtual machine.

    env:              # Defines environment variables used throughout the job.
      ENV_NAME: "ude-dev01"
      ENV_TYPE: "Sandbox"
      REGION: "india"
      CURRENCY: "USD"
      LANGUAGE: "1033"
      DOMAIN_NAME: "ude-dev01"

    steps:            # Defines the sequence of actions executed in the job.
      - uses: actions/checkout@v4        # Checks out (downloads) the repository code into the runner so it can be used in the workflow.

      # Install Power Platform CLI actions
      - uses: microsoft/powerplatform-actions/actions-install@v1

      # Create environment using OIDC (no client secret)
      - name: Create UDE environment
        uses: microsoft/powerplatform-actions/create-environment@v1      # Uses a predefined GitHub Action to create a Power Platform environment.
        with:          # Passes input parameters to the action.
          app-id: ${{ secrets.PP_CLIENT_ID }}          # Uses a stored GitHub secret for the application (client) ID.
          tenant-id: ${{ secrets.PP_TENANT_ID }}       # Uses a stored secret for the Azure tenant ID.

          # Hardcoded values from env
          name: ${{ env.ENV_NAME }}
          environment-type: ${{ env.ENV_TYPE }}
          region: ${{ env.REGION }}
          currency: ${{ env.CURRENCY }}
          language: ${{ env.LANGUAGE }}
          domain-name: ${{ env.DOMAIN_NAME }}

      - name: Done
        run: echo "UDE environment created successfully."
