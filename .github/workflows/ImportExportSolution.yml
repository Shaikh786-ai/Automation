name: Import Export Solution

on:
  workflow_dispatch:
    inputs:
      source_environment_url:
        description: "Source Environment URL (Export)"
        required: true

      target_environment_url:
        description: "Target Environment URL (Import)"
        required: true

      solution_name:
        description: "Solution Name"
        required: true

permissions:
  id-token: write
  contents: read

jobs:

# ================= BUILD (EXPORT) =================
  build:
    runs-on: windows-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Power Platform CLI
      run: dotnet tool install --global Microsoft.PowerApps.CLI.Tool

    - name: Add PAC to PATH
      run: echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

    # ✅ AUTH TO SOURCE ENV
    - name: Authenticate to Source Environment
      run: |
        pac auth create `
          --environment "${{ inputs.source_environment_url }}" `
          --applicationId ${{ secrets.CLIENT_ID }} `
          --clientSecret ${{ secrets.PP_CLIENT_SECRET }} `
          --tenant ${{ secrets.PP_TENANT_ID }}

    - name: Publish Customizations
      run: pac solution publish

    - name: Export Solution
      run: |
        pac solution export `
          --name "${{ inputs.solution_name }}" `
          --path ./solution.zip `
          --managed false

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: solution
        path: solution.zip


# ================= DEPLOY (IMPORT) =================
  deploy:
    runs-on: windows-latest
    needs: build

    steps:

    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: solution

    - name: Install Power Platform CLI
      run: dotnet tool install --global Microsoft.PowerApps.CLI.Tool

    - name: Add PAC to PATH
      run: echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

    # ✅ AUTH TO TARGET ENV
    - name: Authenticate to Target Environment
      run: |
        pac auth create `
          --environment "${{ inputs.target_environment_url }}" `
          --applicationId ${{ secrets.CLIENT_ID }} `
          --clientSecret ${{ secrets.PP_CLIENT_SECRET }} `
          --tenant ${{ secrets.PP_TENANT_ID }}

    - name: Import Solution
      run: |
        pac solution import `
          --path solution.zip `
          --async true `
          --max-async-wait-time 240 `
          --publish-changes true `
          --convert-to-managed true
