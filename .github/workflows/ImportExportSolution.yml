name: Import Export Solution

on:
  workflow_dispatch:
    inputs:
      environment_url:
        description: "Dataverse Environment URL"
        required: true

      solution_name:
        description: "Solution Name"
        required: true

permissions:
  id-token: write
  contents: read

jobs:

  build:
    runs-on: windows-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    # Install PAC CLI
    - name: Install Power Platform CLI
      run: dotnet tool install --global Microsoft.PowerApps.CLI.Tool

    - name: Add PAC to PATH
      run: echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

    # =========================
    # AUTH (FIXED - NO HANG)
    # =========================
    - name: Authenticate to Power Platform
      run: |
        pac auth create `
          --url "${{ inputs.environment_url }}" `
          --applicationId ${{ secrets.CLIENT_ID }} `
          --clientSecret ${{ secrets.PP_CLIENT_SECRET }} `
          --tenant ${{ secrets.PP_TENANT_ID }}

    # Publish customizations
    - name: Publish Customizations
      run: pac solution publish

    # Export solution
    - name: Export Solution
      run: |
        pac solution export `
          --name "${{ inputs.solution_name }}" `
          --path ./solution.zip `
          --managed false

    # Upload artifact
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: solution
        path: solution.zip


  deploy:
    runs-on: windows-latest
    needs: build

    steps:

    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: solution

    - name: Install Power Platform CLI
      run: dotnet tool install --global Microsoft.PowerApps.CLI.Tool

    - name: Add PAC to PATH
      run: echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

    # =========================
    # AUTH (FIXED - NO HANG)
    # =========================
    - name: Authenticate to Target Environment
      run: |
        pac auth create `
          --url "${{ inputs.environment_url }}" `
          --applicationId ${{ secrets.CLIENT_ID }} `
          --clientSecret ${{ secrets.PP_CLIENT_SECRET }} `
          --tenant ${{ secrets.PP_TENANT_ID }}

    # Import solution
    - name: Import Solution
      run: |
        pac solution import `
          --path solution.zip `
          --async true `
          --max-async-wait-time 240 `
          --publish-changes true `
          --convert-to-managed true
