name: Create UDE (OIDC, no secrets)

on:
  workflow_dispatch:
    inputs:
      environment_name:
        description: "Name of the UDE environment"
        required: true
        type: string

      domain_name:
        description: "Unique domain name for the environment"
        required: true
        type: string

      environment_type:
        description: "Environment type"
        required: true
        default: Sandbox
        type: choice
        options:
          - Sandbox
          - Production
          - Trial

      region:
        description: "Dataverse region"
        required: true
        default: unitedstates
        type: string

      currency:
        description: "Currency"
        required: true
        default: USD
        type: string

      language:
        description: "Language code"
        required: true
        default: "1033"
        type: string

      templates:
        description: "Power Platform template"
        required: true
        default: D365_FinOps_Finance
        type: string

  push:
    branches:
      - My_Automation

permissions:
  id-token: write
  contents: read

jobs:
  create-ude:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Power Platform CLI
        uses: microsoft/powerplatform-actions/actions-install@v1.9.1

      - name: Create UDE environment (async-safe)
        uses: microsoft/powerplatform-actions/create-environment@v1.9.1
        with:
          app-id: ${{ secrets.CLIENT_ID }}
          tenant-id: ${{ secrets.PP_TENANT_ID }}

          name: ${{ github.event.inputs.environment_name }}
          environment-type: ${{ github.event.inputs.environment_type }}
          region: ${{ github.event.inputs.region }}
          currency: ${{ github.event.inputs.currency }}
          language: ${{ github.event.inputs.language }}
          domain-name: ${{ github.event.inputs.domain_name }}

          templates: ${{ github.event.inputs.templates }}
          
          max-async-wait-time: 240
          
          template-metadata-json: |
            {
              "PostProvisioningPackages": [
                {
                  "applicationUniqueName": "msdyn_FinanceAndOperationsProvisioningAppAnchor",
                  "parameters": "DevToolsEnabled=true|DemoDataEnabled=true"
                }
              ]
            }
