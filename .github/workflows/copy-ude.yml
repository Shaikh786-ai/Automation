name: Copy Dataverse DB (URLs → Existing) — OIDC, no secrets

on:
  workflow_dispatch

permissions:
  id-token: write
  contents: read

env:
  SOURCE_ENV_URL: "https://org6ee75726.crm8.dynamics.com/"
  TARGET_ENV_URL: "https://orgc6161dd6.crm8.dynamics.com/"
  COPY_TYPE: "FullCopy"     # FullCopy or MinimalCopy
  WAIT_MINUTES: "240"

jobs:
  copy-db:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Install Power Platform CLI
      - name: Install Power Platform CLI
        uses: microsoft/powerplatform-actions/actions-install@v1

      # Ensure PAC CLI is available
      - name: Verify PAC presence (and fallback install)
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v pac >/dev/null 2>&1; then
            echo "Installing PAC via dotnet..."
            dotnet tool install -g Microsoft.PowerApps.CLI.Tool
            echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
          fi
          pac help >/dev/null

      # Authenticate using OIDC
      - name: PAC auth (OIDC, admin context)
        shell: bash
        run: |
          set -euo pipefail
          pac auth clear || true
          pac auth create \
            --tenant        "${{ secrets.PP_TENANT_ID }}" \
            --applicationId "${{ secrets.PP_CLIENT_ID }}" \
            --githubFederated
          pac auth who

      # 🔍 Resolve environment URLs → IDs
      - name: Resolve environment IDs
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          pac admin list --json > envs.json

          SOURCE_ID=$(jq -r --arg URL "$SOURCE_ENV_URL" \
            '.[] | select(.properties.linkedEnvironmentMetadata.instanceUrl==$URL) | .name' envs.json)

          TARGET_ID=$(jq -r --arg URL "$TARGET_ENV_URL" \
            '.[] | select(.properties.linkedEnvironmentMetadata.instanceUrl==$URL) | .name' envs.json)

          if [ -z "$SOURCE_ID" ] || [ -z "$TARGET_ID" ]; then
            echo "❌ Failed to resolve environment IDs from URLs"
            exit 1
          fi

          echo "SOURCE_ENV_ID=$SOURCE_ID" >> $GITHUB_ENV
          echo "TARGET_ENV_ID=$TARGET_ID" >> $GITHUB_ENV

      # 🚀 Copy Dataverse DB
      - name: Copy Dataverse database (source → target)
        shell: bash
        run: |
          set -euo pipefail

          case "$COPY_TYPE" in
            FullCopy|MinimalCopy) ;;
            *) echo "Invalid COPY_TYPE. Use 'FullCopy' or 'MinimalCopy'." && exit 2 ;;
          esac

          pac admin copy \
            --name "DataverseCopyJob" \
            --source-env "$SOURCE_ENV_ID" \
            --target-env "$TARGET_ENV_ID" \
            --type "$COPY_TYPE" \
            --async false \
            --max-async-wait-time "$WAIT_MINUTES"

      - name: Done
        run: echo "Database copy submitted/completed."
